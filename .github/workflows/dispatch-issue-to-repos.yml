name: Dispatch issue to implementation repos

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number to dispatch
        required: true
        type: number

permissions:
  contents: read
  issues: write

jobs:
  dispatch_issue:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.issue.pull_request == null

    steps:
      - name: Resolve issue context
        id: issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const issueNumber = context.eventName === 'workflow_dispatch'
              ? Number(context.payload.inputs.issue_number)
              : context.payload.issue.number;

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            core.setOutput('number', String(issue.number));
            core.setOutput('title', issue.title);
            core.setOutput('body', issue.body || '');
            core.setOutput('url', issue.html_url);
            core.setOutput('author', issue.user?.login || 'unknown');

      - name: Validate dispatch token
        env:
          DISPATCH_TOKEN: ${{ secrets.ORCHESTRATOR_REPO_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "::error::Missing repository secret ORCHESTRATOR_REPO_DISPATCH_TOKEN. Add a GitHub token with access to the target repositories before dispatching."
            exit 1
          fi

      - name: Dispatch to target repositories
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
          ISSUE_URL: ${{ steps.issue.outputs.url }}
          ISSUE_AUTHOR: ${{ steps.issue.outputs.author }}
        with:
          github-token: ${{ secrets.ORCHESTRATOR_REPO_DISPATCH_TOKEN }}
          script: |
            const targets = [
              {
                owner: 'ResumeGenerator',
                repo: 'resume-generator-spa',
                role: 'frontend'
              },
              {
                owner: 'ResumeGenerator',
                repo: 'resume-template-api',
                role: 'template-service'
              },
              {
                owner: 'ResumeGenerator',
                repo: 'resume-parser-api',
                role: 'parser-or-api-service'
              }
            ];

            for (const target of targets) {
              const repoName = `${target.owner}/${target.repo}`;

              try {
                await github.rest.repos.get({
                  owner: target.owner,
                  repo: target.repo
                });
              } catch (error) {
                core.setFailed(
                  `Cannot access ${repoName} with ORCHESTRATOR_REPO_DISPATCH_TOKEN. ` +
                  `Check that the repository name is correct and the token has access to it. ` +
                  `GitHub returned ${error.status || 'unknown status'}: ${error.message}`
                );
                return;
              }

              await github.rest.repos.createDispatchEvent({
                owner: target.owner,
                repo: target.repo,
                event_type: 'orchestrator_issue',
                client_payload: {
                  orchestrator_repo: `${context.repo.owner}/${context.repo.repo}`,
                  orchestrator_issue_number: Number(process.env.ISSUE_NUMBER),
                  orchestrator_issue_title: process.env.ISSUE_TITLE,
                  orchestrator_issue_body: process.env.ISSUE_BODY || '',
                  orchestrator_issue_url: process.env.ISSUE_URL,
                  orchestrator_issue_author: process.env.ISSUE_AUTHOR,
                  issue_number: Number(process.env.ISSUE_NUMBER),
                  issue: {
                    number: Number(process.env.ISSUE_NUMBER),
                    title: process.env.ISSUE_TITLE,
                    body: process.env.ISSUE_BODY || '',
                    url: process.env.ISSUE_URL,
                    author: process.env.ISSUE_AUTHOR
                  },
                  target_role: target.role
                }
              });

              core.info(`Dispatched issue #${process.env.ISSUE_NUMBER} to ${repoName}`);
            }

      - name: Comment on orchestrator issue
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const body = [
              'Dispatched this issue to implementation repositories:',
              '',
              '- `resume-generator-spa`',
              '- `resume-template-api`',
              '- `resume-parser-api`',
              '',
              'Each repository will decide whether changes are needed and create a pull request only if it modifies files.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body
            });
