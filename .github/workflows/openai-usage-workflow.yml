name: OpenAI Usage Report Email

on:
  workflow_dispatch:   # Manual trigger (run anytime from Actions tab)
  schedule:
    - cron: "15 11 * * *"   # 2:15 PM Doha (11:15 UTC)

jobs:
  usage-report:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch usage stats
        run: |
          curl -s -H "Authorization: Bearer $OPENAI_API_KEY" \
            https://api.openai.com/v1/dashboard/billing/usage \
            -o usage.json

      - name: Debug raw JSON (optional)
        run: cat usage.json

      - name: Generate inline report
        id: report
        run: |
          echo "OpenAI Usage Report - $(date)" > REPORT.txt

          # Try to extract total_usage, fallback to N/A
          TOTAL=$(jq -r '.total_usage // "N/A"' usage.json)
          echo "Total Usage: $TOTAL" >> REPORT.txt
          echo "" >> REPORT.txt

          # Try to extract daily_costs or data[] if available
          if jq -e '.daily_costs' usage.json > /dev/null; then
            echo "Daily Costs:" >> REPORT.txt
            jq -r '.daily_costs[]? | "\(.timestamp): \(.cost)"' usage.json >> REPORT.txt
          elif jq -e '.data' usage.json > /dev/null; then
            echo "Daily Breakdown:" >> REPORT.txt
            jq -r '.data[]? | "\(.timestamp): \(.usage)"' usage.json >> REPORT.txt
          else
            echo "No usage data available." >> REPORT.txt
          fi

          REPORT_BODY=$(cat REPORT.txt)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send email via Gmail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASS }}
          subject: "Daily OpenAI Usage Report"
          to: biju777@gmail.com
          from: ${{ secrets.GMAIL_USER }}
          body: ${{ steps.report.outputs.body }}
