name: OpenAI Usage Report Email

on:
  workflow_dispatch:   # Manual trigger (run anytime from Actions tab)
  schedule:
    - cron: "15 11 * * *"   # 2:15 PM Doha (11:15 UTC)

jobs:
  usage-report:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch usage stats (past 7 days)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          START=$(date -d '7 days ago' +%Y-%m-%d)
          END=$(date +%Y-%m-%d)
          curl -s -H "Authorization: Bearer $OPENAI_API_KEY" \
            "https://api.openai.com/v1/usage?start_date=$START&end_date=$END" \
            -o usage.json

      - name: Debug raw JSON (optional)
        run: cat usage.json

      - name: Generate inline report
        id: report
        run: |
          echo "OpenAI Usage Report - $(date)" > REPORT.txt

          if [ "$(jq '.data | length' usage.json)" -eq 0 ]; then
            echo "No usage data available for the past 7 days." >> REPORT.txt
          else
            echo "Usage (past 7 days):" >> REPORT.txt
            jq -r '.data[] | "\(.date): \(.model) total_tokens=\(.n_total_tokens)"' usage.json >> REPORT.txt
          fi

          REPORT_BODY=$(cat REPORT.txt)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send email via Gmail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASS }}
          subject: "Weekly OpenAI Usage Report"
          to: biju777@gmail.com
          from: ${{ secrets.GMAIL_USER }}
          body: ${{ steps.report.outputs.body }}
