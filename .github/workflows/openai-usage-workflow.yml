name: OpenAI Usage Report Email

on:
  workflow_dispatch:   # Manual trigger
  schedule:
    - cron: "15 11 * * *"   # 2:15 PM Doha (11:15 UTC)

jobs:
  usage-report:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch usage stats (last 3 days)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "OpenAI Usage Report - $(date)" > REPORT.txt
          echo "" >> REPORT.txt

          for i in 0 1 2; do
            DAY=$(date -d "$i days ago" +%Y-%m-%d)
            echo "=== $DAY ===" >> REPORT.txt
            curl -s -H "Authorization: Bearer $OPENAI_API_KEY" \
              "https://api.openai.com/v1/usage?date=$DAY" \
              -o usage.json

            if [ "$(jq '.data | length' usage.json)" -eq 0 ]; then
              echo "No usage data available." >> REPORT.txt
            else
              jq -r '.data[] | "\(.model): prompt_tokens=\(.n_prompt_tokens), completion_tokens=\(.n_completion_tokens), total=\(.n_total_tokens)"' usage.json >> REPORT.txt
            fi
            echo "" >> REPORT.txt
          done

          REPORT_BODY=$(cat REPORT.txt)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send email via Gmail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_PASS }}
          subject: "3-Day OpenAI Usage Report"
          to: biju777@gmail.com
          from: ${{ secrets.GMAIL_USER }}
          body: ${{ steps.report.outputs.body }}
